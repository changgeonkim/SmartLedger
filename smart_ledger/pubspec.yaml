name: smart_ledger
description: "스마트 가계부 - 영수증 OCR 기반 소비 관리 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0

  # 이미지 피커 (영수증 촬영/갤러리)
  image_picker: ^1.1.2

  # HTTP (Clova OCR API)
  http: ^1.2.2

  # 날짜 포맷
  intl: ^0.19.0

  # 차트 (통계 화면)
  fl_chart: ^0.70.2

  # 지도
  flutter_naver_map: ^1.3.0
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
